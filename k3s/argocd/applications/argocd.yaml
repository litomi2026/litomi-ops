apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: argocd
  annotations:
    # This app now manages ExternalSecret/SecretStore resources in argocd,
    # so wait until ESO is installed first.
    argocd.argoproj.io/sync-wave: '2'
spec:
  project: platform
  source:
    repoURL: https://github.com/litomi2026/litomi.git
    targetRevision: main
    path: k8s/platform/argocd
  destination:
    server: https://kubernetes.default.svc
    namespace: argocd
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
