apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: minio-operator
  annotations:
    # MinIO Operator는 Tenant보다 먼저 올라와야 해요.
    argocd.argoproj.io/sync-wave: '2'
spec:
  project: platform
  sources:
    - repoURL: https://operator.min.io
      chart: operator
      targetRevision: 7.1.1
      helm:
        releaseName: minio-operator
        valueFiles:
          - $values/k8s/platform/minio/operator.values.yaml
    - repoURL: https://github.com/litomi2026/litomi.git
      targetRevision: main
      ref: values
  destination:
    server: https://kubernetes.default.svc
    namespace: minio-operator
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
