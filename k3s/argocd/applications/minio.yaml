apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: minio
  annotations:
    # MinIO Tenant는 Operator와 ESO(Secret 주입) 뒤에 생성해요.
    argocd.argoproj.io/sync-wave: '3'
spec:
  project: platform
  sources:
    - repoURL: https://operator.min.io
      chart: tenant
      targetRevision: 7.1.1
      helm:
        releaseName: tenant
        valueFiles:
          - $values/k8s/platform/minio/tenant.values.yaml
    - repoURL: https://github.com/litomi2026/litomi.git
      targetRevision: main
      ref: values
    - repoURL: https://github.com/litomi2026/litomi.git
      targetRevision: main
      path: k8s/platform/minio
  destination:
    server: https://kubernetes.default.svc
    namespace: minio
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
