apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: fluent-bit
  annotations:
    # Loki가 먼저 뜬 뒤에 에이전트를 붙여 초기 드롭/재시도 노이즈를 줄여요.
    argocd.argoproj.io/sync-wave: '5'
spec:
  project: platform
  sources:
    - repoURL: https://fluent.github.io/helm-charts
      chart: fluent-bit
      targetRevision: 0.55.0
      helm:
        releaseName: fluent-bit
        valueFiles:
          - $values/k8s/platform/logging/fluent-bit.values.yaml
    - repoURL: https://github.com/litomi2026/litomi.git
      targetRevision: main
      ref: values
  destination:
    server: https://kubernetes.default.svc
    namespace: logging
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
