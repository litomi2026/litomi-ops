apiVersion: apps/v1
kind: Deployment
metadata:
  name: litomi-web
spec:
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 0
      maxUnavailable: 1
  template:
    spec:
      containers:
        - name: web
          resources:
            requests:
              cpu: 40m
              memory: 480Mi
            limits:
              cpu: 500m
              memory: 544Mi
          env:
            # TODO: staging Vault Secret이 APP_/CATALOG_ PostgreSQL 키로 마이그레이션되면 제거한다.
            - name: APP_POSTGRES_URL
              valueFrom:
                secretKeyRef:
                  name: litomi-api-secret
                  key: POSTGRES_URL
            # TODO: staging Vault Secret이 APP_/CATALOG_ PostgreSQL 키로 마이그레이션되면 제거한다.
            - name: APP_POSTGRES_CERTIFICATE
              valueFrom:
                secretKeyRef:
                  name: litomi-api-secret
                  key: SUPABASE_CERTIFICATE
            - name: APP_POSTGRES_APPLICATION_NAME
              value: litomi-web-stg
            - name: APP_POSTGRES_POOL_MAX
              value: '1'
            # TODO: staging Vault Secret이 APP_/CATALOG_ PostgreSQL 키로 마이그레이션되면 제거한다.
            - name: CATALOG_POSTGRES_URL
              valueFrom:
                secretKeyRef:
                  name: litomi-api-secret
                  key: AIVEN_POSTGRES_URL
            # TODO: staging Vault Secret이 APP_/CATALOG_ PostgreSQL 키로 마이그레이션되면 제거한다.
            - name: CATALOG_POSTGRES_CERTIFICATE
              valueFrom:
                secretKeyRef:
                  name: litomi-api-secret
                  key: AIVEN_CERTIFICATE
            - name: CATALOG_POSTGRES_APPLICATION_NAME
              value: litomi-web-stg-catalog
            - name: CATALOG_POSTGRES_POOL_MAX
              value: '1'
