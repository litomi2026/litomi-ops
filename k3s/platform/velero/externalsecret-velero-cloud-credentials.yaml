apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: velero-cloud-credentials
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: SecretStore
    name: vault
  target:
    name: velero-cloud-credentials
    creationPolicy: Owner
    deletionPolicy: Delete
  data:
    - secretKey: cloud
      remoteRef:
        key: velero/velero-cloud-credentials
        property: cloud
        # ESO가 기본값으로 채우는 필드까지 명시해서 Argo CD OutOfSync를 방지해요.
        conversionStrategy: Default
        decodingStrategy: None
        metadataPolicy: None
