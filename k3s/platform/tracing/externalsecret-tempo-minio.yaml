apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: tempo-minio
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: SecretStore
    name: vault
  target:
    name: tempo-minio
    creationPolicy: Owner
    deletionPolicy: Delete
  data:
    - secretKey: access_key
      remoteRef:
        key: minio/minio-root
        property: root-user
        # ESO가 기본값으로 채우는 필드까지 명시해서 Argo CD OutOfSync를 방지해요.
        conversionStrategy: Default
        decodingStrategy: None
        metadataPolicy: None
    - secretKey: secret_key
      remoteRef:
        key: minio/minio-root
        property: root-password
        # ESO가 기본값으로 채우는 필드까지 명시해서 Argo CD OutOfSync를 방지해요.
        conversionStrategy: Default
        decodingStrategy: None
        metadataPolicy: None
