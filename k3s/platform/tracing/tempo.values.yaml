# Tempo Helm chart values (grafana-community/tempo)

replicas: 1

tempo:
  reportingEnabled: false
  retention: 72h
  extraArgs:
    # Tempo config에서 ${ENV}를 확장해 Secret 값을 주입해요.
    # https://grafana.com/docs/tempo/latest/configuration/
    config.expand-env: 'true'
  extraEnv:
    - name: TEMPO_S3_ACCESS_KEY
      valueFrom:
        secretKeyRef:
          name: tempo-minio
          key: access_key
    - name: TEMPO_S3_SECRET_KEY
      valueFrom:
        secretKeyRef:
          name: tempo-minio
          key: secret_key
  securityContext:
    allowPrivilegeEscalation: false
    capabilities:
      drop:
        - ALL
    seccompProfile:
      type: RuntimeDefault
  resources:
    requests:
      cpu: 10m
      memory: 544Mi
    limits:
      cpu: 310m
      # 최근 p99.9와 WAL/compaction 여유를 함께 반영해요.
      memory: 768Mi
  storage:
    trace:
      backend: s3
      s3:
        bucket: litomi-tempo-traces
        endpoint: minio.minio.svc:80
        access_key: ${TEMPO_S3_ACCESS_KEY}
        secret_key: ${TEMPO_S3_SECRET_KEY}
        insecure: true
      wal:
        path: /var/tempo/wal
  receivers:
    otlp:
      protocols:
        grpc:
          endpoint: 0.0.0.0:4317
        http:
          endpoint: 0.0.0.0:4318

persistence:
  enabled: true
  size: 20Gi

serviceMonitor:
  enabled: true
  interval: 30s
  additionalLabels:
    release: kube-prometheus-stack
    app.kubernetes.io/instance: kube-prometheus-stack
