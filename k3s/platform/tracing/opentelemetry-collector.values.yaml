# OpenTelemetry Collector Helm chart values (opentelemetry-collector)

mode: deployment
replicaCount: 1

image:
  repository: otel/opentelemetry-collector-contrib

podSecurityContext:
  runAsNonRoot: true
  seccompProfile:
    type: RuntimeDefault

securityContext:
  allowPrivilegeEscalation: false
  capabilities:
    drop:
      - ALL
  runAsNonRoot: true
  runAsUser: 10001
  runAsGroup: 10001

presets:
  kubernetesAttributes:
    enabled: true

ports:
  metrics:
    enabled: true
  jaeger-compact:
    enabled: false
  jaeger-thrift:
    enabled: false
  jaeger-grpc:
    enabled: false
  zipkin:
    enabled: false

resources:
  requests:
    cpu: 20m
    memory: 192Mi
  limits:
    cpu: 400m
    memory: 256Mi

serviceMonitor:
  enabled: true
  metricsEndpoints:
    - port: metrics
      interval: 30s
  extraLabels:
    release: kube-prometheus-stack
    app.kubernetes.io/instance: kube-prometheus-stack

alternateConfig:
  extensions:
    health_check:
      endpoint: ${env:MY_POD_IP}:13133
  receivers:
    otlp:
      protocols:
        grpc:
          endpoint: ${env:MY_POD_IP}:4317
        http:
          endpoint: ${env:MY_POD_IP}:4318
  processors:
    memory_limiter:
      check_interval: 5s
      limit_percentage: 80
      spike_limit_percentage: 25
    batch: {}
    k8sattributes:
      auth_type: serviceAccount
  exporters:
    otlp/tempo:
      endpoint: tempo.tracing.svc:4317
      tls:
        # Collector->Tempo mTLS를 해제하고 plaintext(gRPC)로 전송해요.
        insecure: true
  service:
    telemetry:
      metrics:
        readers:
          - pull:
              exporter:
                prometheus:
                  host: ${env:MY_POD_IP}
                  port: 8888
    extensions:
      - health_check
    pipelines:
      traces:
        receivers:
          - otlp
        processors:
          - memory_limiter
          - k8sattributes
          - batch
        exporters:
          - otlp/tempo
