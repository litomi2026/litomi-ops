apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: tempo-ingress
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: tempo
      app.kubernetes.io/instance: tempo
  policyTypes:
    - Ingress
  ingress:
    # Allow only the OTel collector in tracing namespace to send traces.
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: tracing
          podSelector:
            matchLabels:
              app.kubernetes.io/name: opentelemetry-collector
              app.kubernetes.io/instance: opentelemetry-collector
      ports:
        - protocol: TCP
          port: 4317
    # Prometheus in monitoring namespace scrapes Tempo metrics endpoint.
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: monitoring
      ports:
        - protocol: TCP
          port: 3200
