# Loki Helm chart values (grafana/loki)

deploymentMode: SingleBinary

loki:
  auth_enabled: false
  commonConfig:
    replication_factor: 1
  storage:
    type: s3
    bucketNames:
      chunks: litomi-loki-chunks
      ruler: litomi-loki-ruler
    s3:
      endpoint: minio.minio.svc:80
      accessKeyId: ${LOKI_S3_ACCESS_KEY}
      secretAccessKey: ${LOKI_S3_SECRET_KEY}
      s3ForcePathStyle: true
      insecure: true
  schemaConfig:
    configs:
      - from: '2024-04-01'
        store: tsdb
        object_store: s3
        schema: v13
        index:
          prefix: loki_index_
          period: 24h
  ingester:
    chunk_encoding: snappy
  limits_config:
    retention_period: 168h
  compactor:
    retention_enabled: true
    # Loki 3.x validates this when retention is enabled; omit하면 프로세스가 기동 직후 종료돼요.
    delete_request_store: s3
  tracing:
    enabled: true

singleBinary:
  replicas: 1
  persistence:
    enabled: true
    size: 30Gi
  resources:
    requests:
      cpu: 35m
      memory: 544Mi
    limits:
      cpu: 310m
      memory: 608Mi
  extraArgs:
    # Secret 값을 Loki 설정으로 확장하기 위해 env expansion을 활성화해요.
    - -config.expand-env=true
  extraEnv:
    # Go heap 상한을 cgroup limit보다 조금 낮춰 OOM 리스크를 줄여요.
    - name: GOMEMLIMIT
      value: 544MiB
    - name: LOKI_S3_ACCESS_KEY
      valueFrom:
        secretKeyRef:
          name: loki-minio
          key: access_key
    - name: LOKI_S3_SECRET_KEY
      valueFrom:
        secretKeyRef:
          name: loki-minio
          key: secret_key

sidecar:
  resources:
    requests:
      cpu: 5m
      memory: 112Mi
    limits:
      cpu: 750m
      memory: 120Mi

# Single-node(16GiB) 환경에서는 chunks-cache 기본 request가 너무 커 스케줄링 실패가 발생해요.
chunksCache:
  enabled: false

resultsCache:
  allocatedMemory: 16
  resources:
    requests:
      cpu: 5m
      memory: 24Mi
    limits:
      cpu: 50m
      memory: 32Mi

memcachedExporter:
  resources:
    requests:
      cpu: 5m
      memory: 24Mi
    limits:
      cpu: 310m
      memory: 24Mi

lokiCanary:
  resources:
    requests:
      cpu: 5m
      memory: 48Mi
    limits:
      cpu: 310m
      memory: 56Mi

backend:
  replicas: 0
read:
  replicas: 0
write:
  replicas: 0
ingester:
  replicas: 0
querier:
  replicas: 0
queryFrontend:
  replicas: 0
queryScheduler:
  replicas: 0
distributor:
  replicas: 0
compactor:
  replicas: 0
indexGateway:
  replicas: 0
bloomCompactor:
  replicas: 0
bloomGateway:
  replicas: 0

gateway:
  enabled: false

minio:
  enabled: false

monitoring:
  dashboards:
    enabled: true
  rules:
    enabled: true
  serviceMonitor:
    enabled: true
    labels:
      release: kube-prometheus-stack
      app.kubernetes.io/instance: kube-prometheus-stack
