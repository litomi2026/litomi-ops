apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: minio-env-configuration
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: SecretStore
    name: vault
  target:
    name: minio-env-configuration
    creationPolicy: Owner
    deletionPolicy: Delete
    template:
      engineVersion: v2
      data:
        # MinIO Tenant chart가 요구하는 config.env 포맷으로 렌더링해요.
        config.env: |-
          export MINIO_ROOT_USER={{ .root_user }}
          export MINIO_ROOT_PASSWORD={{ .root_password }}
  data:
    - secretKey: root_user
      remoteRef:
        key: minio/minio-root
        property: root-user
        # ESO가 기본값으로 채우는 필드까지 명시해서 Argo CD OutOfSync를 방지해요.
        conversionStrategy: Default
        decodingStrategy: None
        metadataPolicy: None
    - secretKey: root_password
      remoteRef:
        key: minio/minio-root
        property: root-password
        # ESO가 기본값으로 채우는 필드까지 명시해서 Argo CD OutOfSync를 방지해요.
        conversionStrategy: Default
        decodingStrategy: None
        metadataPolicy: None
