# MinIO 공식 Tenant Helm values (minio/tenant)

tenant:
  name: minio

  image:
    repository: quay.io/minio/minio
    tag: RELEASE.2025-07-23T15-54-02Z
    pullPolicy: IfNotPresent

  configSecret:
    name: minio-env-configuration
    existingSecret: true

  pools:
    - name: pool-0
      servers: 1
      volumesPerServer: 1
      size: 20Gi
      securityContext:
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        fsGroupChangePolicy: OnRootMismatch
        runAsNonRoot: true
      containerSecurityContext:
        runAsUser: 1000
        runAsGroup: 1000
        runAsNonRoot: true
        allowPrivilegeEscalation: false
        capabilities:
          drop:
            - ALL
        seccompProfile:
          type: RuntimeDefault
      resources:
        requests:
          cpu: 30m
          memory: 416Mi
        limits:
          cpu: 300m
          memory: 576Mi

  certificate:
    # Velero가 내부 HTTP endpoint로 접근하므로 auto TLS를 끄고 시작해요.
    requestAutoCert: false

  buckets:
    - name: litomi-velero-backups
    - name: litomi-tempo-traces
    - name: litomi-loki-chunks
    - name: litomi-loki-ruler

  metrics:
    enabled: true
    port: 9000
    protocol: http

  # kube-prometheus-stack의 Prometheus CR는 monitoring 네임스페이스에 있어서
  # Tenant가 기본값으로 찾는 네임스페이스와 달라 reconcile 에러가 반복돼요.
  prometheusOperator: false
