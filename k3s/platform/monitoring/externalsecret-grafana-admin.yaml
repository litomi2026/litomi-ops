apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: grafana-admin
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: SecretStore
    name: vault
  target:
    name: grafana-admin
    creationPolicy: Owner
    deletionPolicy: Delete
  dataFrom:
    - extract:
        key: monitoring/grafana-admin
        # ESO가 기본값으로 채우는 필드까지 명시해서 Argo CD OutOfSync를 방지해요.
        conversionStrategy: Default
        decodingStrategy: None
        metadataPolicy: None
