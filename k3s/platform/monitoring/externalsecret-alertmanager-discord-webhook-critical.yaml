apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: alertmanager-discord-webhook-critical
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: SecretStore
    name: vault
  target:
    name: alertmanager-discord-webhook-critical
    creationPolicy: Owner
    deletionPolicy: Delete
  data:
    - secretKey: url
      remoteRef:
        key: monitoring/alertmanager-discord-webhook-critical
        property: url
        # ESO가 기본값으로 채우는 필드까지 명시해서 Argo CD OutOfSync를 방지해요.
        conversionStrategy: Default
        decodingStrategy: None
        metadataPolicy: None
