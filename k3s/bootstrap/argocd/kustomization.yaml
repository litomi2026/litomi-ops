apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# Argo CD 설치는 "처음 1번"만 kubectl로 부트스트랩하고,
# 이후 앱/플랫폼 리소스는 Argo CD(Application)로 GitOps 관리하는 걸 권장해요.

namespace: argocd

resources:
  - namespace.yaml
  # 멀티 노드 환경에선 manifests/ha/install.yaml 사용하기
  - https://raw.githubusercontent.com/argoproj/argo-cd/v3.3.0/manifests/install.yaml

patches:
  # 재실행 시 대상이 이미 있으면 실패할 수 있어, -sf로 바꿔서 init container를 idempotent하게 만들어요.
  - path: patches/argocd-repo-server-copyutil.yaml
