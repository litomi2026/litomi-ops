apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: grafana-cloud-metrics
  namespace: grafana-k8s-monitoring
spec:
  refreshInterval: 15m
  secretStoreRef:
    kind: ClusterSecretStore
    name: oci-vault
  target:
    name: grafana-cloud-metrics-grafana-k8s-monitoring
    creationPolicy: Owner
    deletionPolicy: Delete
  data:
    - secretKey: username
      remoteRef:
        key: litomi-prod-grafana-cloud-k8s
        conversionStrategy: Default
        decodingStrategy: None
        metadataPolicy: None
        nullBytePolicy: Ignore
        property: GRAFANA_CLOUD_METRICS_USERNAME
    - secretKey: password
      remoteRef:
        key: litomi-prod-grafana-cloud-k8s
        conversionStrategy: Default
        decodingStrategy: None
        metadataPolicy: None
        nullBytePolicy: Ignore
        property: GRAFANA_CLOUD_METRICS_PASSWORD
---
