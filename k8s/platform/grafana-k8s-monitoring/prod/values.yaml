global:
  scrapeInterval: 120s

cluster:
  name: litomi-prod

destinations:
  grafana-cloud-metrics:
    type: prometheus
    url: https://prometheus-prod-49-prod-ap-northeast-0.grafana.net/api/prom/push
    secret:
      create: false
      name: grafana-cloud-metrics-grafana-k8s-monitoring
    auth:
      type: basic
      usernameKey: username
      passwordKey: password
  grafana-cloud-logs:
    type: loki
    url: https://logs-prod-030.grafana.net/loki/api/v1/push
    secret:
      create: false
      name: grafana-cloud-logs-grafana-k8s-monitoring
    auth:
      type: basic
      usernameKey: username
      passwordKey: password
  grafana-cloud-profiles:
    type: pyroscope
    url: https://profiles-prod-019.grafana.net
    secret:
      create: false
      name: grafana-cloud-profiles-grafana-k8s-monitoring
    auth:
      type: basic
      usernameKey: username
      passwordKey: password

clusterMetrics:
  enabled: true
  collector: alloy-metrics

hostMetrics:
  enabled: true
  collector: alloy-metrics
  linuxHosts:
    enabled: true
  windowsHosts:
    enabled: false
  energyMetrics:
    enabled: false

costMetrics:
  enabled: false

clusterEvents:
  enabled: true
  collector: alloy-singleton

podLogsViaLoki:
  enabled: true
  collector: alloy-logs
  namespaces:
    - litomi-api
    - litomi-web
    - litomi-chat
    - litomi-chat-worker
    - litomi-chat-push
    - litomi-cataloger
    - litomi-notifier
    - litomi-recommender

annotationAutodiscovery:
  enabled: false

prometheusOperatorObjects:
  enabled: false

nodeLogs:
  enabled: false

podLogsObjects:
  enabled: false

applicationObservability:
  enabled: false

profiling:
  enabled: true
  collector: alloy-profiles
  destinations:
    - grafana-cloud-profiles
  # 런타임이 Bun(JSC)이라 pyroscope-nodejs SDK(V8/@datadog/pprof)는 동작 불가 → eBPF만 사용.
  # JSC는 JS 프레임 심볼화가 제한적이므로 네이티브 핫스팟(sharp/zlib/TLS/GC) 위주로 보인다.
  ebpf:
    enabled: true
    targetingScheme: all
    namespaces:
      - litomi-api
      - litomi-web
    # 네이티브(C++) 심볼 디맹글 — sharp/libvips 등 핫스팟 프레임 가독성용
    demangle: full
    # eBPF discovery는 service_name/namespace만 세팅하고, pod-logs와 달리 resource.opentelemetry.io/*
    # 어노테이션을 라벨로 승격하는 labelmap이 없다(최신 차트도 동일). pod-logs가 내부에서 쓰는 것과
    # 동일한 규칙을 넣어 deployment_environment_name 등 리소스 어노테이션을 프로파일 라벨로 승격 →
    # App O11y trace↔profile 상관관계 정합. service.version 등 추가 리소스 속성도 자동 반영.
    extraDiscoveryRules: |
      rule {
        action = "labelmap"
        regex = "__meta_kubernetes_pod_annotation_resource_opentelemetry_io_(.+)"
      }
  java:
    enabled: false
  pprof:
    enabled: false

autoInstrumentation:
  enabled: false

integrations:
  collector: alloy-metrics
  alloy:
    instances:
      - name: alloy
        labelSelectors:
          app.kubernetes.io/name:
            - alloy-metrics
            - alloy-singleton
            - alloy-logs

collectorCommon:
  alloy:
    controller:
      priorityClassName: platform-standard

collectors:
  alloy-metrics:
    presets:
      - clustered
      - statefulset
    alloy:
      resources:
        requests:
          cpu: 40m
          memory: 256Mi
        limits:
          memory: 512Mi
    controller:
      nodeSelector:
        node-pool-role: platform
      tolerations:
        - key: node-pool-role
          operator: Equal
          value: platform
          effect: NoSchedule
      replicas: 1
  alloy-singleton:
    presets:
      - singleton
    alloy:
      resources:
        requests:
          cpu: 15m
          memory: 128Mi
        limits:
          memory: 192Mi
    controller:
      nodeSelector:
        node-pool-role: platform
      tolerations:
        - key: node-pool-role
          operator: Equal
          value: platform
          effect: NoSchedule
      replicas: 1
  alloy-logs:
    presets:
      - filesystem-log-reader
      - daemonset
    alloy:
      resources:
        requests:
          cpu: 5m
          memory: 64Mi
        limits:
          cpu: 100m
          memory: 256Mi
    # 앱이 전부 workload 노드에서 돌므로 로그 collector도 거기 고정한다.
    controller:
      nodeSelector:
        node-pool-role: workload
  alloy-profiles:
    presets:
      # eBPF 프로파일러는 root + hostPID + privileged가 있어야 tracefs 마운트/kallsyms 읽기가 가능.
      - privileged
      - daemonset
    alloy:
      resources:
        requests:
          cpu: 25m
          memory: 128Mi
        limits:
          cpu: 200m
          memory: 512Mi
    controller:
      nodeSelector:
        node-pool-role: workload

alloy-operator:
  priorityClassName: platform-standard
  nodeSelector:
    kubernetes.io/os: linux
    node-pool-role: platform
  tolerations:
    - key: node-pool-role
      operator: Equal
      value: platform
      effect: NoSchedule
  resources:
    requests:
      cpu: 35m
      memory: 128Mi
    limits:
      memory: 192Mi

telemetryServices:
  kube-state-metrics:
    deploy: true
    replicas: 0
    priorityClassName: platform-standard
    nodeSelector:
      node-pool-role: platform
    tolerations:
      - key: node-pool-role
        operator: Equal
        value: platform
        effect: NoSchedule
    resources:
      requests:
        cpu: 20m
        memory: 64Mi
      limits:
        memory: 128Mi
  node-exporter:
    deploy: true
    nodeSelector:
      kubernetes.io/os: linux
    resources:
      requests:
        cpu: 5m
        memory: 32Mi
      limits:
        memory: 128Mi
  windows-exporter:
    deploy: false
  opencost:
    deploy: false
  kepler:
    deploy: false
