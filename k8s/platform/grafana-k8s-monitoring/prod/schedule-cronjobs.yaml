apiVersion: batch/v1
kind: CronJob
metadata:
  name: grafana-k8s-monitoring-start
  namespace: grafana-k8s-monitoring
spec:
  schedule: '0 5 * * *'
  timeZone: Asia/Seoul
  concurrencyPolicy: Forbid
  startingDeadlineSeconds: 600
  successfulJobsHistoryLimit: 1
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      activeDeadlineSeconds: 300
      backoffLimit: 1
      template:
        metadata:
          labels:
            app.kubernetes.io/name: grafana-k8s-monitoring-start
            app.kubernetes.io/part-of: grafana-k8s-monitoring
        spec:
          serviceAccountName: grafana-k8s-monitoring-scheduler
          restartPolicy: OnFailure
          securityContext:
            seccompProfile:
              type: RuntimeDefault
          containers:
            - name: kubectl
              image: ghcr.io/grafana/helm-chart-toolbox-kubectl:0.1.2
              imagePullPolicy: IfNotPresent
              securityContext:
                allowPrivilegeEscalation: false
                runAsNonRoot: true
                runAsUser: 65532
                runAsGroup: 65532
                capabilities:
                  drop:
                    - ALL
              command:
                - /bin/sh
                - -ec
                - |
                  namespace=grafana-k8s-monitoring

                  # host hours를 발생시키는 kube-state-metrics만 켠다 (그 외 collector는 24/7 가동).
                  kubectl -n "${namespace}" scale deployment/grafana-k8s-monitoring-kube-state-metrics --replicas=1 || true
---
apiVersion: batch/v1
kind: CronJob
