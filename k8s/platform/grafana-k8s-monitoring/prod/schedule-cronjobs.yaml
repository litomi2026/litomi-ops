                  namespace=grafana-k8s-monitoring

                  # host hours를 발생시키는 kube-state-metrics만 끈다 (그 외 collector는 24/7 가동).
                  kubectl -n "${namespace}" scale deployment/grafana-k8s-monitoring-kube-state-metrics --replicas=0 || true
