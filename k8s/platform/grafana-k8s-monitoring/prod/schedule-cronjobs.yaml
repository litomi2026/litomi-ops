      backoffLimit: 1
      template:
        metadata:
          labels:
            app.kubernetes.io/name: grafana-k8s-monitoring-stop
            app.kubernetes.io/part-of: grafana-k8s-monitoring
        spec:
          serviceAccountName: grafana-k8s-monitoring-scheduler
          restartPolicy: OnFailure
          securityContext:
            seccompProfile:
              type: RuntimeDefault
          containers:
            - name: kubectl
              image: ghcr.io/grafana/helm-chart-toolbox-kubectl:0.1.2
              imagePullPolicy: IfNotPresent
              securityContext:
                allowPrivilegeEscalation: false
                runAsNonRoot: true
                runAsUser: 65532
                runAsGroup: 65532
                capabilities:
                  drop:
                    - ALL
              command:
                - /bin/sh
                - -ec
