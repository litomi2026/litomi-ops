reloader:
  reloadStrategy: annotations
  isArgoRollouts: true
  deployment:
    priorityClassName: platform-standard
    nodeSelector:
      node-pool-role: platform
    tolerations:
      - key: node-pool-role
        operator: Equal
        value: platform
        effect: NoSchedule
    containerSecurityContext:
      allowPrivilegeEscalation: false
      capabilities:
        drop:
          - ALL
      readOnlyRootFilesystem: true
    resources:
      requests:
        cpu: 10m
        memory: 64Mi
      limits:
        memory: 128Mi
