apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: litomi-web
resources:
  - ../../base/web
  - hpa.yaml
  - pdb.yaml
  - limit-range.yaml
  - resource-quota.yaml
  - rollouts-gatewayapi-rbac.yaml
generatorOptions:
  disableNameSuffixHash: true
configMapGenerator:
  - name: litomi-web-public-env
    envs:
      - public.env
  - name: litomi-web-env
    literals:
      - APP_ENV=prod
      - APP_ORIGIN=https://litomi.in
replacements:
  - source:
      kind: ConfigMap
      name: litomi-web-env
      fieldPath: data.APP_ORIGIN
    targets:
      - select:
          kind: ConfigMap
          name: litomi-web-public-env
        fieldPaths:
          - data.NEXT_PUBLIC_APP_ORIGIN
        options:
          create: true
images:
  - name: ghcr.io/litomi2026/litomi-web
    digest: sha256:0557ade8ca04f486067289733dfc8b3554f348e2d4c5ade53cf6e74ae1cd023c
