apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: litomi-web
resources:
  - ../../base/web
  - pdb.yaml
  - limit-range.yaml
  - resource-quota.yaml
generatorOptions:
  disableNameSuffixHash: true
configMapGenerator:
  - name: litomi-web-public-env
    envs:
      - public.env
  - name: litomi-web-env
    literals:
      - APP_ENV=prod
      - APP_ORIGIN=https://litomi.in
replacements:
  - source:
      kind: ConfigMap
      name: litomi-web-env
      fieldPath: data.APP_ORIGIN
    targets:
      - select:
          kind: ConfigMap
          name: litomi-web-public-env
        fieldPaths:
          - data.NEXT_PUBLIC_APP_ORIGIN
        options:
          create: true
images:
  - name: ghcr.io/litomi2026/litomi-web
    digest: sha256:a4eb54998faab3073fd307343d31fa0884e23b2e8df17b79bbe1ffc20d31767b
