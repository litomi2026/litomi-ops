      - OTEL_SERVICE_NAME=litomi-api
      - OTEL_TRACES_SAMPLER=parentbased_traceidratio
      - OTEL_TRACES_SAMPLER_ARG=0.1
images:
  - digest: sha256:0a46bf81e0dac612795226da21be9b9069994e954176884858ceb84cbdb80bfa
    name: ghcr.io/litomi2026/litomi-api
