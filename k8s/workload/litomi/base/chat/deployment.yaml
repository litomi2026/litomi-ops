apiVersion: apps/v1
kind: Deployment
metadata:
  name: litomi-chat
  labels:
    app.kubernetes.io/name: litomi-chat
    app.kubernetes.io/part-of: litomi
spec:
  replicas: 2
  minReadySeconds: 5
  progressDeadlineSeconds: 600
  revisionHistoryLimit: 3
  selector:
    matchLabels:
      app.kubernetes.io/name: litomi-chat
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app.kubernetes.io/name: litomi-chat
        app.kubernetes.io/part-of: litomi
    spec:
      automountServiceAccountToken: false
      serviceAccountName: litomi-chat
      priorityClassName: workload-standard
      terminationGracePeriodSeconds: 30
      nodeSelector:
        node-pool-role: workload
      topologySpreadConstraints:
        - labelSelector:
            matchLabels:
              app.kubernetes.io/name: litomi-chat
          maxSkew: 1
          topologyKey: kubernetes.io/hostname
          whenUnsatisfiable: ScheduleAnyway
      containers:
        - name: chat
          image: ghcr.io/litomi2026/litomi-chat:overlay-required
          imagePullPolicy: IfNotPresent
          env:
            - name: PORT
              value: '3003'
            - name: K8S_NODE_NAME
              valueFrom:
                fieldRef:
                  fieldPath: spec.nodeName
          envFrom:
            - configMapRef:
                name: litomi-chat-env
            - secretRef:
                name: litomi-chat-env
          ports:
            - containerPort: 3003
              name: http
          startupProbe:
            httpGet:
              path: /health
              port: http
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 12
          # Readiness mirrors the drain flag: once shutting down, /health returns
          # 503 and the gateway stops routing new upgrades to this pod.
          readinessProbe:
            httpGet:
              path: /health
              port: http
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 2
          # Liveness is a bare TCP check on purpose. /health 503s while draining,
          # so an httpGet liveness probe would restart a perfectly healthy pod
          # mid-drain; TCP only asks "is the process still accepting sockets?".
          livenessProbe:
            tcpSocket:
              port: http
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              cpu: 1000m
              memory: 256Mi
          securityContext:
            allowPrivilegeEscalation: false
            runAsNonRoot: true
            runAsUser: 65532
            runAsGroup: 65532
            capabilities:
              drop:
                - ALL
            seccompProfile:
              type: RuntimeDefault
