apiVersion: batch/v1
kind: CronJob
metadata:
  name: litomi-cataloger
  labels:
    app.kubernetes.io/name: litomi-cataloger
    app.kubernetes.io/part-of: litomi
spec:
  schedule: '30 5 * * *'
  timeZone: Asia/Seoul
  concurrencyPolicy: Forbid
  startingDeadlineSeconds: 600
  successfulJobsHistoryLimit: 1
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      activeDeadlineSeconds: 3600
      backoffLimit: 1
      template:
        metadata:
          labels:
            app.kubernetes.io/name: litomi-cataloger
            app.kubernetes.io/part-of: litomi
        spec:
          restartPolicy: OnFailure
          automountServiceAccountToken: false
          serviceAccountName: litomi-cataloger
          priorityClassName: workload-standard
          nodeSelector:
            node-pool-role: workload
          containers:
            - name: cataloger
              image: ghcr.io/litomi2026/litomi-cataloger:overlay-required
              imagePullPolicy: IfNotPresent
              envFrom:
                - secretRef:
                    name: litomi-cataloger-env
              resources:
                requests:
                  cpu: 100m
                  memory: 512Mi
                limits:
                  cpu: 1000m
                  memory: 1Gi
              securityContext:
                allowPrivilegeEscalation: false
                runAsNonRoot: true
                runAsUser: 65532
                runAsGroup: 65532
                capabilities:
                  drop:
                    - ALL
                seccompProfile:
                  type: RuntimeDefault
