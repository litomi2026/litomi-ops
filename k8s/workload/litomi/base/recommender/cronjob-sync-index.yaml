apiVersion: batch/v1
kind: CronJob
metadata:
  name: litomi-recommender-sync-index
  labels:
    app.kubernetes.io/name: litomi-recommender
    app.kubernetes.io/component: sync-index
    app.kubernetes.io/part-of: litomi
spec:
  # Activation switch: flip to false once the subcommand-aware image digest has been promoted by CI.
  suspend: true
  # Rebuilds the OpenSearch manga index from the freshly crawled catalog, before the generate job at 06:30 KST.
  schedule: '0 6 * * *'
  timeZone: Asia/Seoul
  concurrencyPolicy: Forbid
  startingDeadlineSeconds: 600
  successfulJobsHistoryLimit: 1
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      activeDeadlineSeconds: 1800
      backoffLimit: 1
      template:
        metadata:
          labels:
            app.kubernetes.io/name: litomi-recommender
            app.kubernetes.io/component: sync-index
            app.kubernetes.io/part-of: litomi
        spec:
          restartPolicy: OnFailure
          automountServiceAccountToken: false
          serviceAccountName: litomi-recommender
          priorityClassName: workload-standard
          nodeSelector:
            node-pool-role: workload
          containers:
            - name: recommender
              image: ghcr.io/litomi2026/litomi-recommender:overlay-required
              imagePullPolicy: IfNotPresent
              args:
                - sync-index
                - --batch-size=1000
              envFrom:
                - secretRef:
                    name: litomi-recommender-env
              resources:
                requests:
                  cpu: 100m
                  memory: 128Mi
                limits:
                  cpu: 500m
                  memory: 512Mi
              securityContext:
                allowPrivilegeEscalation: false
                runAsNonRoot: true
                runAsUser: 65532
                runAsGroup: 65532
                capabilities:
                  drop:
                    - ALL
                seccompProfile:
                  type: RuntimeDefault
