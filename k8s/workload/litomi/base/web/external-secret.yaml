apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: litomi-web-env
spec:
  refreshInterval: 15m
  secretStoreRef:
    kind: ClusterSecretStore
    name: oci-vault
  target:
    name: litomi-web-env
    creationPolicy: Owner
    deletionPolicy: Delete
  dataFrom:
    - extract:
        key: litomi-prod-web
