apiVersion: apps/v1
kind: Deployment
metadata:
  name: litomi-web
  labels:
    app.kubernetes.io/name: litomi-web
    app.kubernetes.io/part-of: litomi
spec:
  minReadySeconds: 5
  progressDeadlineSeconds: 600
  revisionHistoryLimit: 3
  selector:
    matchLabels:
      app.kubernetes.io/name: litomi-web
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app.kubernetes.io/name: litomi-web
        app.kubernetes.io/part-of: litomi
    spec:
      automountServiceAccountToken: false
      serviceAccountName: litomi-web
      priorityClassName: workload-standard
      nodeSelector:
        node-pool-role: workload
      topologySpreadConstraints:
        - labelSelector:
            matchLabels:
              app.kubernetes.io/name: litomi-web
          maxSkew: 1
          topologyKey: kubernetes.io/hostname
          whenUnsatisfiable: ScheduleAnyway
      containers:
        - name: web
          image: ghcr.io/litomi2026/litomi-web:overlay-required
          imagePullPolicy: IfNotPresent
          env:
            - name: PORT
              value: '3000'
          envFrom:
            - configMapRef:
                name: litomi-web-public-env
            - configMapRef:
                name: litomi-web-env
            - secretRef:
                name: litomi-web-env
          ports:
            - containerPort: 3000
              name: http
          startupProbe:
            httpGet:
              path: /health
              port: http
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 12
          readinessProbe:
            httpGet:
              path: /health
              port: http
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 2
          livenessProbe:
            httpGet:
              path: /health
              port: http
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          resources:
            requests:
              cpu: 310m
              memory: 1248Mi
            limits:
              cpu: 1000m
              memory: 1664Mi
          securityContext:
            allowPrivilegeEscalation: false
            runAsNonRoot: true
            runAsUser: 1001
            runAsGroup: 1001
            capabilities:
              drop:
                - ALL
            seccompProfile:
              type: RuntimeDefault
