apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: litomi-api-google-credentials
spec:
  refreshInterval: 15m
  secretStoreRef:
    kind: ClusterSecretStore
    name: oci-vault
  target:
    name: litomi-api-google-credentials
    creationPolicy: Owner
    deletionPolicy: Delete
  data:
    - secretKey: credential-configuration.json
      remoteRef:
        key: litomi-prod-api
        property: GOOGLE_APPLICATION_CREDENTIALS_JSON
