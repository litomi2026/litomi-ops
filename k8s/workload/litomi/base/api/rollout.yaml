apiVersion: argoproj.io/v1alpha1
kind: Rollout
metadata:
  name: litomi-api
  labels:
    app.kubernetes.io/name: litomi-api
    app.kubernetes.io/part-of: litomi
spec:
  replicas: 2
  minReadySeconds: 5
  progressDeadlineSeconds: 600
  revisionHistoryLimit: 3
  selector:
    matchLabels:
      app.kubernetes.io/name: litomi-api
  strategy:
    canary:
      stableService: litomi-api
      canaryService: litomi-api-canary
      maxSurge: 0
      maxUnavailable: 1
      trafficRouting:
        plugins:
          argoproj-labs/gatewayAPI:
            httpRoute: litomi-api
            namespace: litomi-api
      steps:
        - setWeight: 10
        - pause:
            duration: 5m
        - setWeight: 50
        - pause:
            duration: 10m
  template:
    metadata:
      labels:
        app.kubernetes.io/name: litomi-api
        app.kubernetes.io/part-of: litomi
    spec:
      automountServiceAccountToken: false
      serviceAccountName: litomi-api
      priorityClassName: workload-standard
      nodeSelector:
        node-pool-role: workload
      topologySpreadConstraints:
        - labelSelector:
            matchLabels:
              app.kubernetes.io/name: litomi-api
          maxSkew: 1
          topologyKey: kubernetes.io/hostname
          whenUnsatisfiable: ScheduleAnyway
      containers:
        - name: api
          image: ghcr.io/litomi2026/litomi-api:overlay-required
          imagePullPolicy: IfNotPresent
          env:
            - name: PORT
              value: '3002'
            - name: GOOGLE_APPLICATION_CREDENTIALS
              value: /etc/workload-identity/credential-configuration.json
          envFrom:
            - configMapRef:
                name: litomi-api-env
            - secretRef:
                name: litomi-api-env
          volumeMounts:
            - name: google-identity-token
              mountPath: /var/run/service-account
              readOnly: true
            - name: google-application-credentials
              mountPath: /etc/workload-identity
              readOnly: true
          ports:
            - containerPort: 3002
              name: http
          startupProbe:
            httpGet:
              path: /startup
              port: http
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 12
          readinessProbe:
            httpGet:
              path: /ready
              port: http
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 1
            successThreshold: 1
          livenessProbe:
            httpGet:
              path: /health
              port: http
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          resources:
            requests:
              cpu: 100m
              memory: 768Mi
            limits:
              cpu: 1000m
              memory: 1536Mi
          securityContext:
            allowPrivilegeEscalation: false
            runAsNonRoot: true
            runAsUser: 65532
            runAsGroup: 65532
            capabilities:
              drop:
                - ALL
            seccompProfile:
              type: RuntimeDefault
      volumes:
        - name: google-identity-token
          projected:
            sources:
              - serviceAccountToken:
                  audience: litomi-api-google-analytics
                  expirationSeconds: 3600
                  path: token
        - name: google-application-credentials
          secret:
            secretName: litomi-api-google-credentials
            optional: true
