apiVersion: argoproj.io/v1alpha1
kind: AppProject
metadata:
  annotations:
    argocd.argoproj.io/sync-wave: "-4"
  name: platform
  namespace: argocd
spec:
  description: Platform delivery boundary for shared cluster services and infrastructure.
  destinations:
    - namespace: argocd
      server: https://kubernetes.default.svc
    - namespace: cert-manager
      server: https://kubernetes.default.svc
    - namespace: external-secrets
      server: https://kubernetes.default.svc
    - namespace: argo-rollouts
      server: https://kubernetes.default.svc
    - namespace: istio-system
      server: https://kubernetes.default.svc
    - namespace: istio-ingress
      server: https://kubernetes.default.svc
    - namespace: grafana-k8s-monitoring
      server: https://kubernetes.default.svc
  sourceRepos:
    - https://github.com/litomi2026/litomi-ops.git
    - https://github.com/kubernetes-sigs/gateway-api.git
    - https://istio-release.storage.googleapis.com/charts
    - https://charts.jetstack.io
    - https://charts.external-secrets.io
    - https://argoproj.github.io/argo-helm
    - https://github.com/argoproj/argo-rollouts.git
    - https://grafana.github.io/helm-charts
  clusterResourceWhitelist:
    - group: ""
      kind: Namespace
      name: argocd
    - group: ""
      kind: Namespace
      name: cert-manager
    - group: ""
      kind: Namespace
      name: external-secrets
    - group: ""
      kind: Namespace
      name: argo-rollouts
    - group: ""
      kind: Namespace
      name: istio-system
    - group: ""
      kind: Namespace
      name: istio-ingress
    - group: ""
      kind: Namespace
      name: grafana-k8s-monitoring
    - group: admissionregistration.k8s.io
      kind: MutatingWebhookConfiguration
    - group: admissionregistration.k8s.io
      kind: ValidatingWebhookConfiguration
    - group: apiextensions.k8s.io
      kind: CustomResourceDefinition
    - group: cert-manager.io
      kind: ClusterIssuer
      name: letsencrypt-dns01
    - group: gateway.networking.k8s.io
      kind: GatewayClass
      name: istio
    - group: security.istio.io
      kind: PeerAuthentication
    - group: security.istio.io
      kind: RequestAuthentication
    - group: security.istio.io
      kind: AuthorizationPolicy
    - group: networking.istio.io
      kind: Gateway
    - group: networking.istio.io
      kind: VirtualService
    - group: networking.istio.io
      kind: DestinationRule
    - group: networking.istio.io
      kind: ServiceEntry
    - group: telemetry.istio.io
      kind: Telemetry
    - group: rbac.authorization.k8s.io
      kind: ClusterRole
    - group: rbac.authorization.k8s.io
      kind: ClusterRoleBinding
    - group: scheduling.k8s.io
      kind: PriorityClass
      name: platform-critical
    - group: scheduling.k8s.io
      kind: PriorityClass
      name: platform-standard
    - group: scheduling.k8s.io
      kind: PriorityClass
      name: workload-standard
    - group: storage.k8s.io
      kind: StorageClass
      name: oci-bv-paravirtualized
  namespaceResourceWhitelist:
    - group: ""
      kind: ConfigMap
    - group: ""
      kind: Secret
    - group: ""
      kind: Service
    - group: ""
      kind: ServiceAccount
    - group: apps
      kind: Deployment
    - group: apps
      kind: DaemonSet
    - group: apps
      kind: StatefulSet
    - group: batch
      kind: CronJob
    - group: batch
      kind: Job
    - group: collectors.grafana.com
      kind: Alloy
    - group: external-secrets.io
      kind: ExternalSecret
    - group: gateway.networking.k8s.io
      kind: Gateway
    - group: gateway.networking.k8s.io
      kind: HTTPRoute
    - group: networking.istio.io
      kind: EnvoyFilter
    - group: networking.k8s.io
      kind: NetworkPolicy
    - group: rbac.authorization.k8s.io
      kind: Role
    - group: rbac.authorization.k8s.io
      kind: RoleBinding
  orphanedResources:
    warn: false
