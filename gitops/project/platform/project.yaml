apiVersion: argoproj.io/v1alpha1
kind: AppProject
metadata:
  annotations:
    argocd.argoproj.io/sync-wave: "-4"
  name: platform
  namespace: argocd
spec:
  description: Platform delivery boundary for shared cluster services and infrastructure.
  destinations:
    - namespace: argocd
      server: https://kubernetes.default.svc
    - namespace: cert-manager
      server: https://kubernetes.default.svc
    - namespace: external-secrets
      server: https://kubernetes.default.svc
    - namespace: argo-rollouts
      server: https://kubernetes.default.svc
    - namespace: istio-system
      server: https://kubernetes.default.svc
    - namespace: istio-ingress
      server: https://kubernetes.default.svc
    - namespace: metrics-server
      server: https://kubernetes.default.svc
    - namespace: kube-system
      server: https://kubernetes.default.svc
  sourceRepos:
    - https://github.com/litomi2026/litomi-ops.git
    - https://github.com/kubernetes-sigs/gateway-api.git
    - https://istio-release.storage.googleapis.com/charts
    - https://charts.jetstack.io
    - https://charts.external-secrets.io
    - https://argoproj.github.io/argo-helm
    - https://github.com/argoproj/argo-rollouts.git
    - https://kubernetes-sigs.github.io/metrics-server/
  clusterResourceWhitelist:
    - group: ""
      kind: Namespace
      name: argocd
    - group: ""
      kind: Namespace
      name: cert-manager
    - group: ""
      kind: Namespace
      name: external-secrets
    - group: ""
      kind: Namespace
      name: argo-rollouts
    - group: ""
      kind: Namespace
      name: istio-system
    - group: ""
      kind: Namespace
      name: istio-ingress
    - group: ""
      kind: Namespace
      name: metrics-server
    - group: admissionregistration.k8s.io
      kind: MutatingWebhookConfiguration
    - group: admissionregistration.k8s.io
      kind: ValidatingWebhookConfiguration
    - group: apiextensions.k8s.io
      kind: CustomResourceDefinition
    - group: apiregistration.k8s.io
      kind: APIService
    - group: cert-manager.io
      kind: ClusterIssuer
      name: letsencrypt-http01
    - group: gateway.networking.k8s.io
      kind: GatewayClass
      name: istio
    - group: security.istio.io
      kind: PeerAuthentication
    - group: security.istio.io
      kind: RequestAuthentication
    - group: security.istio.io
      kind: AuthorizationPolicy
    - group: networking.istio.io
      kind: Gateway
    - group: networking.istio.io
      kind: VirtualService
    - group: networking.istio.io
      kind: DestinationRule
    - group: networking.istio.io
      kind: ServiceEntry
    - group: telemetry.istio.io
      kind: Telemetry
    - group: rbac.authorization.k8s.io
      kind: ClusterRole
    - group: rbac.authorization.k8s.io
      kind: ClusterRoleBinding
    - group: scheduling.k8s.io
      kind: PriorityClass
      name: platform-critical
    - group: scheduling.k8s.io
      kind: PriorityClass
      name: platform-standard
    - group: scheduling.k8s.io
      kind: PriorityClass
      name: workload-standard
    - group: storage.k8s.io
      kind: StorageClass
      name: oci-bv-paravirtualized
  namespaceResourceWhitelist:
    - group: "*"
      kind: "*"
  orphanedResources:
    warn: false
