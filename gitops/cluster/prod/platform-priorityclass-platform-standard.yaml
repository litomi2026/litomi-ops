apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: priorityclass-platform-standard
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: '-2'
spec:
  project: platform
  source:
    repoURL: https://github.com/litomi2026/litomi-ops.git
    targetRevision: main
    path: k8s/platform/priority-class/platform-standard
  destination:
    server: https://kubernetes.default.svc
    namespace: argocd
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
