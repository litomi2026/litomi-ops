apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: grafana-k8s-monitoring
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: '2'
spec:
  project: platform
  sources:
    - repoURL: https://grafana.github.io/helm-charts
      chart: k8s-monitoring
      targetRevision: 4.1.4
      helm:
        releaseName: grafana-k8s-monitoring
        valueFiles:
          - $values/k8s/platform/grafana-k8s-monitoring/prod/values.yaml
    - repoURL: https://github.com/litomi2026/litomi-ops.git
      targetRevision: main
      ref: values
      path: k8s/platform/grafana-k8s-monitoring/prod
  destination:
    server: https://kubernetes.default.svc
    namespace: grafana-k8s-monitoring
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - ServerSideApply=true
      - RespectIgnoreDifferences=true
  # 스케줄러 CronJob은 host hours를 발생시키는 kube-state-metrics만 특정 시각에 켠다.
  # host/container hours는 KSM 데이터로만 집계되고, 무료 3 hosts < 클러스터 4 노드라 KSM은 스케줄을 유지한다.
  ignoreDifferences:
    # kube-state-metrics Deployment만 replicas를 0/1로 토글해 일시정지/재개한다.
    - group: apps
      kind: Deployment
      name: grafana-k8s-monitoring-kube-state-metrics
      jsonPointers:
        - /spec/replicas
