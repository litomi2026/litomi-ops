apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: argo-rollouts
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: '0'
spec:
  project: platform
  sources:
    - repoURL: https://argoproj.github.io/argo-helm
      chart: argo-rollouts
      targetRevision: 2.40.6
      helm:
        releaseName: argo-rollouts
        valueFiles:
          - $values/k8s/platform/argo-rollouts/prod/values.yaml
    - repoURL: https://github.com/litomi2026/litomi-ops.git
      targetRevision: main
      ref: values
      path: k8s/platform/argo-rollouts/prod
  destination:
    server: https://kubernetes.default.svc
    namespace: argo-rollouts
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
