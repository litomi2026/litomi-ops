apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: root
  namespace: argocd
spec:
  project: bootstrap
  source:
    repoURL: https://github.com/litomi2026/litomi-ops.git
    targetRevision: main
    path: gitops/cluster/prod
  destination:
    server: https://kubernetes.default.svc
    namespace: argocd
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
